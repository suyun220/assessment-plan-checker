<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교과별 평가계획 점검 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a;
    --sub:#5b5b5b;
    --line:#e4e4e4;
    --bg:#ffffff;
    --panel:#fafafa;
    --teal:#2A9D99;
    --teal-dark:#1f7d7a;
    --teal-tint:#eaf6f5;
    --red:#c0392b;
    --red-tint:#fdecea;
    --amber:#b8860b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans KR', -apple-system, "Malgun Gothic", sans-serif;
    background:var(--bg);
    color:var(--ink);
    font-size:14px;
    line-height:1.6;
  }
  .wrap{max-width:920px;margin:0 auto;padding:36px 24px 80px;}
  header.top{
    display:flex;justify-content:space-between;align-items:flex-start;
    border-bottom:2px solid var(--ink);
    padding-bottom:18px;margin-bottom:28px;
  }
  header.top h1{font-size:22px;font-weight:900;margin:0 0 4px;letter-spacing:-0.5px;}
  header.top p{margin:0;color:var(--sub);font-size:13px;}
  .badge{
    font-size:12px;font-weight:700;color:var(--teal-dark);
    background:var(--teal-tint);border:1px solid var(--teal);
    padding:4px 10px;border-radius:20px;white-space:nowrap;
  }

  .setup-notice{
    border:1px solid var(--amber);background:#fdf6e3;color:#6b5400;
    border-radius:10px;padding:18px 20px;margin-bottom:24px;font-size:13px;
  }
  .setup-notice code{background:#fff;padding:1px 6px;border-radius:4px;border:1px solid var(--line);}

  .card{
    border:1px solid var(--line);border-radius:12px;
    padding:22px;margin-bottom:20px;background:var(--panel);
  }
  .card h2{font-size:15px;font-weight:700;margin:0 0 14px;}

  .upload-zone{
    border:2px dashed var(--line);border-radius:10px;
    padding:28px;text-align:center;cursor:pointer;
    transition:border-color .15s, background .15s;
    background:#fff;position:relative;
  }
  .upload-zone.drag{border-color:var(--teal);background:var(--teal-tint);}
  .upload-zone input{position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;}
  .upload-icon{margin-bottom:8px;}
  .upload-zone .title-line{font-weight:700;font-size:14px;}
  .upload-zone .hint{color:var(--sub);font-size:13px;margin-top:6px;}
  .upload-zone .filename{
    font-weight:700;color:var(--teal-dark);margin-top:10px;font-size:14px;
  }

  button{
    font-family:inherit;font-size:14px;font-weight:700;
    border:none;border-radius:8px;padding:12px 22px;
    cursor:pointer;transition:opacity .15s;
  }
  button.primary{background:var(--ink);color:#fff;}
  button.primary:disabled{background:#c9c9c9;cursor:not-allowed;}
  button.primary:not(:disabled):hover{opacity:.85;}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  button.ghost:hover{border-color:var(--ink);}
  .actions{margin-top:16px;display:flex;gap:10px;align-items:center;}

  .progress-log{margin-top:18px;font-size:13px;color:var(--sub);}
  .progress-log .line{display:flex;align-items:center;gap:8px;padding:5px 0;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line);flex-shrink:0;}
  .dot.done{background:var(--teal);}
  .dot.active{background:var(--amber);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  .summary-bar{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px;}
  .stat{flex:1;min-width:120px;border:1px solid var(--line);border-radius:10px;padding:14px 16px;background:var(--panel);}
  .stat .num{font-size:24px;font-weight:900;}
  .stat .label{font-size:12px;color:var(--sub);margin-top:2px;}
  .stat.issue .num{color:var(--red);}
  .stat.ok .num{color:var(--teal-dark);}

  .subject-card{border:1px solid var(--line);border-radius:12px;margin-bottom:14px;overflow:hidden;background:#fff;}
  .subject-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;cursor:pointer;background:var(--panel);}
  .subject-head:hover{background:#f2f2f2;}
  .subject-head .name{font-size:15px;font-weight:700;}
  .subject-head .meta{font-size:12px;color:var(--sub);display:flex;gap:10px;align-items:center;}
  .subject-head .arrow{transition:transform .15s;color:var(--sub);display:inline-block;}
  .subject-head .arrow.open{transform:rotate(90deg);}
  .pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:12px;}
  .pill.issue{background:var(--red-tint);color:var(--red);}
  .pill.clean{background:var(--teal-tint);color:var(--teal-dark);}
  .pill.concern{background:var(--amber-tint);color:var(--amber);}

  .issue-row .loc{font-size:11.5px;color:var(--sub);margin-bottom:2px;}
  .concern-row{border-top:1px solid var(--line);padding:14px 0;}
  .concern-row .row-top{display:flex;gap:10px;align-items:baseline;margin-bottom:6px;}
  .concern-row .num-tag{font-size:11px;font-weight:700;color:#fff;background:var(--amber);padding:1px 7px;border-radius:5px;flex-shrink:0;}
  .concern-row .area{font-weight:700;font-size:13.5px;}
  .concern-row .loc{font-size:11.5px;color:var(--sub);margin-bottom:2px;}
  .concern-row .found{font-size:13px;color:var(--ink);margin:4px 0 8px;background:var(--amber-tint);border-left:3px solid var(--amber);padding:8px 12px;border-radius:0 6px 6px 0;}
  .concern-row .advice{font-size:13px;color:var(--ink);background:#f2f2f2;border-left:3px solid var(--sub);padding:8px 12px;border-radius:0 6px 6px 0;}
  .section-label{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.03em;margin:14px 0 2px;}

  .subject-body{padding:0 18px 18px;display:none;}
  .subject-body.open{display:block;}

  .issue-row{border-top:1px solid var(--line);padding:14px 0;}
  .issue-row .row-top{display:flex;gap:10px;align-items:baseline;margin-bottom:6px;}
  .issue-row .num-tag{font-size:11px;font-weight:700;color:#fff;background:var(--ink);padding:1px 7px;border-radius:5px;flex-shrink:0;}
  .issue-row .area{font-weight:700;font-size:13.5px;}
  .issue-row .found{font-size:13px;color:var(--ink);margin:4px 0 8px;background:var(--red-tint);border-left:3px solid var(--red);padding:8px 12px;border-radius:0 6px 6px 0;}
  .issue-row .advice{font-size:13px;color:var(--ink);background:var(--teal-tint);border-left:3px solid var(--teal);padding:8px 12px;border-radius:0 6px 6px 0;}
  .issue-row .advice b{color:var(--teal-dark);}

  .clean-msg{padding:16px 0;color:var(--teal-dark);font-size:13.5px;font-weight:500;}

  .error-box{background:var(--red-tint);border:1px solid var(--red);color:var(--red);padding:12px 16px;border-radius:8px;font-size:13px;margin-top:14px;white-space:pre-wrap;}

  footer.note{margin-top:36px;font-size:12px;color:var(--sub);border-top:1px solid var(--line);padding-top:14px;}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div>
      <h1>교과별 평가계획 점검 시스템</h1>
      <p>충남 학업성적관리 시행지침 &amp; 2026 학생평가 점검 길잡이 기준 자동 점검 · v2</p>
    </div>
    <span class="badge">v2</span>
  </header>

  <div id="setupNoticeArea"></div>

  <div class="card" id="uploadCard">
    <h2>1. 교과별 평가계획서 업로드</h2>
    <div class="upload-zone" id="dropZone">
      <input type="file" id="fileInput" accept="application/pdf" style="display:none;">
      <div class="upload-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2A9D99" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <polyline points="9 15 12 12 15 15"></polyline>
        </svg>
      </div>
      <div class="title-line">클릭하거나 PDF 파일을 이곳에 끌어다 놓으세요</div>
      <div class="hint">교과별 평가계획서 (여러 과목이 포함된 PDF) 1개</div>
      <div class="filename" id="fileName"></div>
    </div>
    <div class="actions">
      <button class="primary" id="startBtn" disabled>점검 시작</button>
      <button class="ghost" id="resetBtn" style="display:none;">다시 하기</button>
    </div>
    <div class="progress-log" id="progressLog"></div>
    <div id="errorBox"></div>
  </div>

  <div id="summaryArea"></div>
  <div id="resultsArea"></div>

  <footer class="note">
    ※ 이 도구는 Google Gemini가 업로드된 PDF 내용을 직접 읽고 판단합니다. 최종 판단과 학업성적관리위원회 심의 절차는 반드시 담당자가 직접 확인해주세요.
  </footer>

</div>

<script>
/* ─────────────────────────────────────────
   배포 시 아래 GAS_URL 값을 본인의
   Google Apps Script 웹 앱 배포 URL로 교체하세요.
   (예: https://script.google.com/macros/s/AKfycb.../exec)
───────────────────────────────────────── */
const GAS_URL = "https://script.google.com/macros/s/AKfycbxXbNNp5dDXzBxg3_ARNJHZgwsd6eBZv8WWMg2ohdWXDwU3yYMhOLNPTmLbuf0TIaR9/exec";

const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const fileNameEl = document.getElementById('fileName');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');
const progressLog = document.getElementById('progressLog');
const errorBox = document.getElementById('errorBox');
const summaryArea = document.getElementById('summaryArea');
const resultsArea = document.getElementById('resultsArea');
const setupNoticeArea = document.getElementById('setupNoticeArea');
const uploadCard = document.getElementById('uploadCard');

const GAS_CONFIGURED = GAS_URL && GAS_URL.indexOf('PASTE_YOUR') === -1;

if (!GAS_CONFIGURED) {
  setupNoticeArea.innerHTML = `
    <div class="setup-notice">
      <b>⚠ 설정이 필요합니다.</b> 이 파일 하단의 <code>GAS_URL</code> 값에
      배포한 Google Apps Script 웹 앱 URL을 붙여넣어야 점검이 실행됩니다.
      (Code.gs를 Apps Script에 배포한 후 나오는 <code>.../exec</code> URL)
    </div>
  `;
  startBtn.disabled = true;
  dropZone.style.opacity = '.5';
  dropZone.style.pointerEvents = 'none';
}

let pdfBase64 = null;

// ---------- 파일 업로드 처리 ----------
// 페이지 전체 어디에 파일을 놓아도 브라우저가 자체적으로 파일을 열어버리지 않도록 전역 방어
['dragover','drop'].forEach(evt=>{
  window.addEventListener(evt, (e)=>{ e.preventDefault(); });
});

dropZone.addEventListener('click', ()=>{ fileInput.click(); });
fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
['dragover','dragenter'].forEach(evt=>{
  dropZone.addEventListener(evt, (e)=>{e.preventDefault(); e.stopPropagation(); dropZone.classList.add('drag');});
});
['dragleave'].forEach(evt=>{
  dropZone.addEventListener(evt, (e)=>{e.preventDefault(); e.stopPropagation(); dropZone.classList.remove('drag');});
});
dropZone.addEventListener('drop', (e)=>{
  e.preventDefault();
  e.stopPropagation();
  dropZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

function handleFile(file){
  if (file.type !== 'application/pdf'){
    showError('PDF 파일만 업로드할 수 있습니다.');
    return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    pdfBase64 = reader.result.split(',')[1];
    fileNameEl.textContent = '선택됨: ' + file.name;
    if (GAS_CONFIGURED) startBtn.disabled = false;
    clearError();
  };
  reader.onerror = () => showError('파일을 읽는 중 오류가 발생했습니다.');
  reader.readAsDataURL(file);
}

function showError(msg){ errorBox.innerHTML = `<div class="error-box">${escapeHtml(msg)}</div>`; }
function clearError(){ errorBox.innerHTML = ''; }

function logLine(text, status){
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = `<span class="dot ${status}"></span><span></span>`;
  div.querySelector('span:last-child').textContent = text;
  progressLog.appendChild(div);
  return div;
}
function setLineDone(div, text){
  div.querySelector('.dot').className = 'dot done';
  if(text) div.querySelector('span:last-child').textContent = text;
}

// ---------- 점검 기준 (양식2 + 점검 길잡이 요약) ----------
const CHECKLIST_KNOWLEDGE = `
[교과별 평가계획 점검 기준 - 충남 학업성적관리 시행지침 및 2026 학생평가 점검 길잡이 양식2 기반]

■ 평가계획 전반
1. 학년별 적용 교육과정에 따른 용어를 알맞게 사용 (1·2학년: 학점·성취수준 / 3학년: 단위·평가기준). 2015/2022 개정 교육과정 용어를 혼용하지 않았는지 확인.
2. 학년·교과목별 성적처리방식을 현행 교육과정과 훈령에 따라 적용 (과목명, 교육과정 편제, 성취도, 등급산출 여부/성적처리 유형을 정확히 기재했는지). 특히 2022 개정 교육과정 공통과목 성취도 E단계 범위(40~60%미만, 최소성취수준 보장지도 이수시 E부여)와 선택과목 E단계 범위(60%미만)를 학년/과목 구분에 맞게 표기했는지 확인.
3. 단위 학교 교육과정 편제표에 근거하여 개설된 모든 과목의 평가계획이 수립되었는지 (공동교육과정/학교연합·지역연계·온라인학교 포함, 교양교과 등 누락 없이).
4. 학업성적관리 시행지침 제8조제2항 내용 포함 여부: (1)평가 목적·방향·방침·유의사항 (2)평가 종류·방법·시기 (3)정기시험과 수행평가의 시기·영역·요소·방법·횟수·세부기준(영역별 배점과 채점기준)·반영비율, 결시자와 학적변동자 처리기준(인정점 포함) (4)기준 성취율·분할점수 산출방식·성취도·성적처리유형 (5)성적처리 방법 및 결과의 활용.
5. [고] 1·2학년 공통과목, 3학년 공통과목 국어·수학·영어 및 전문교과Ⅱ 실무과목의 과목별 최소 성취수준(학업성취율 40% 기준, 최소 성취수준 진술문)을 설정했는지.
6. 교차채점 계획과 [고] 동점자(동석차) 성적처리규정 포함 여부 - 서답형 문항 출제 교과는 교차채점 계획 필수, 등급을 산출하는 교과는 동점자 처리규정 필수(2022개정 전문교과는 1방안까지만 설정 가능).
+ 평가계획 내용과 학교 학업성적관리규정의 일치 여부: 예) 규정상 등급자 처리기준 순위(2회고사→1회고사→수행평가)와 평가계획의 순위 표기가 다른 경우, 규정상 "부정행위시 0점"인데 평가계획에는 다른 점수(예: 20점) 부여로 명시한 경우 등 규정과 상충되는 부분이 없는지.

■ 정기시험·수행평가 계획 설계
9. 정기시험 실시 교과(군)의 경우 서답형 평가를 정기시험 배점의 30% 이상으로 계획했는지(학업성적관리위원회 심의로 결정된 수행평가 비중 60%이상 교과 제외). 국어·수학·영어·한국사·사회(역사/도덕 포함)·과학 교과(군)은 서·논술형 평가가 정기시험 배점의 20% 이상인지. ※ 비율 기준을 충족한 경우 이는 "이슈"가 아니며, 충족항목수에만 반영하고 "몇 %이므로 기준을 충족한다"는 식의 확인 서술이나 "~을 더 확대하는 것을 고려해볼 수 있다"는 식의 권장 사족을 절대 덧붙이지 말 것. 실제로 기준(30%/20%) 미달인 경우에만 이슈로 보고할 것.
10. 정기시험 및 수행평가 영역의 서·논술형 평가 환산 비율이 한 학기 환산점 100점(과목만점) 중 20% 이상인지. ※ 위 9번과 마찬가지로 기준을 충족했다면 이슈로 보고하지 말 것.
11. [특] 1·2학년 전문교과 전공실무과목(3학년 전문교과Ⅱ 실무과목)의 능력단위별 반영비율 합계가 100%인지.
12. 수행평가를 최소 2개 영역 이상 계획했는지. 각 수행평가 시기가 적절히 분산되어 있고 각 영역이 서로 다른 성취기준을 다루는지.
13. 수행평가 영역명을 평가 내용 및 평가 방법이 표현되도록 구체적으로 작성했는지 (예: '실험'이 아니라 '혈액형 판정 실험' 처럼 구체적으로).

■ 수행평가 과제별 세부 계획
14. 수행평가 영역별로 성취기준과 성취수준(평가기준)을 명시하고, 성취기준·교육과정 내용에 근거한 평가요소가 제시되었는지.
15. 평가 종류·반영비율표의 평가 시기 및 반영비율이 수행평가 과제별 세부 계획의 내용과 일치하는지.
16. 성취기준을 분석하여 평가요소를 선정하고 이를 고려하여 평가 방법을 선정했는지.
17. 암기식 수행평가 및 과제형 수행평가(수업시간 외 가정 등에서 이루어지는 것) 금지, 일제고사 형태의 평가 지양했는지.
18. 수행평가의 기본점수 부여 시 영역 만점의 40% 이하로 설정했는지.
19. 적절한 서·논술형 평가 방식을 활용하고 있는지 - 발표, 구술, 실험 준비, 그림 그리기 등 그 자체로 서·논술형 평가로 인정되지 않는 방식을 서·논술형 평가로 잘못 분류한 경우에만 이슈로 보고할 것. 서·논술형 평가로 인정되는 방식(보고서, 에세이, 논술 등)에 부가적으로 "몇 자 이상 작성", "양식에 맞게 작성" 같은 분량·형식 기준이 포함된 것 자체는 문제가 아니므로, "형식적 요소를 강조할 우려가 있다"는 식의 애매하고 주관적인 지적은 하지 말 것.
20. 수행평가 채점 기준표에서 항목(채점요소)별 배점의 급간을 균등하게 설정했는지. ※ 판정 기준: 급간이 일정한 점수 차이로 감소하는 경우(예: 25-20-15-10, 5점씩 균등) 또는 과목 만점을 급간 수로 나눌 때 나누어떨어지지 않아 마지막 급간만 1점 차이 나는 경우(예: 15-12-9-5, 또는 15점을 4구간으로 나눠 3-3-3-4점씩)는 균등한 것으로 보고 이슈로 보고하지 말 것. 반면 30-25-20-10, 50-40-30-15처럼 급간 간 점수 차이가 들쭉날쭉하고 불균등한 경우에만 이슈로 보고할 것.
21. 채점 기준(기대 수행)이 중복되지 않았는지 (예: 잘못된 예 "3가지 이상 충족 15점 / 1가지 이상 충족 10점"(범위중복) → 올바른 예 "3~4가지 충족 15점 / 1~2가지 충족 10점"). ※ 중복 없이 잘 작성된 경우는 이슈로 보고하지 말 것 (아래 공통 지시사항 참고).
22. 지적 횟수, 제출 기한, 포트폴리오 작성 분량, 성취율(%), 성실성을 채점 기준으로 삼지 않았는지(제출여부·성실성만으로 급간이 결정되는 평가 지양).
23. 채점 기준(기대 수행)의 객관성 확보 여부 - '지적 개수당 1점 감점', '정성을 다해/성의 없이', '적절하게/부적절하게' 등 급간을 나누는 채점 기준 자체가 모호한 표현으로 되어 있는 경우만 이슈로 볼 것. 단, '매체 자료 선정의 적절성', '주제 설정의 타당성' 등 학생이 자유롭게 선택한 소재·주제·자료에 대한 판단은 평가권자인 교사가 제출된 결과물을 보고 사후적으로 평가할 수밖에 없는 영역이므로, 이런 항목까지 사전에 세부 기준을 명시하라고 요구하는 것은 애매하고 주관적인 지적이니 이슈로 보고하지 말 것.
24. 모둠활동 등 복수 학생 공동수행 평가 시 개별학생에게 역할을 부여하고 개인별 학습과제에 대한 수행 과정과 결과를 평가하도록 계획했는지 (무임승차 방지).
25. 수행평가 부정행위 유형 및 부정행위자 처리 기준을 명시했는지 (교과별 평가계획 또는 학업성적관리규정에 명시 필요).
26. AI 활용 관리 방안 - ※ 이 항목은 평가계획서 또는 채점 기준표 안에 "OO영역에서 AI를 활용하여 ~", 특정 인공지능 프로그램/툴 명칭을 언급하며 활용하게 한다는 등 AI 활용에 대한 명시적 언급이 실제로 존재하는 경우에만 점검할 것. 그런 언급이 있다면 허용 범위(차시), 허용 도구, 표기 방법, 금지 행위 및 유의사항, 관련 부정행위 처리 기준이 함께 명시되어 있는지 확인하고, 빠져 있으면 이슈로 보고. 평가계획서에 AI 관련 언급이 전혀 없는 과목은 이 항목을 점검 대상에서 제외하고 이슈로 보고하지 말 것 (모든 과목이 AI 활용 관리 방안을 반드시 포함해야 하는 것은 아님).

■ 기타 (인정점 부여, 동점자 처리 기준 등)
27a. 평가요소별 "배점"(반영비율×영역만점으로 산출된 값)과 해당 평가요소의 "채점 기준표"에 실제 기재된 최고 점수가 서로 일치하는지 반드시 대조할 것. 예) 표 상단에 특정 평가요소의 배점이 "60점"으로 명시되어 있는데, 그 평가요소의 채점 기준표(급간별 점수)는 "100점"부터 시작하는 경우 - 이는 명백한 숫자 불일치이므로 이슈로 보고. 배점표와 채점기준표에 등장하는 모든 숫자를 문서에 쓰인 그대로 비교해서 판정할 것 (임의로 반올림하거나 비율 계산으로 얼버무리지 말 것).
27. 추정분할점수 사용 교과: 수행평가 추정분할점수를 평가계획에 포함했는지.
28. 장기 미인정 결석자, 고의적 미제출자, 백지답안 제출자의 점수는 기본점수보다 낮게 설정되었는지 (기본점수와 동일하게 설정되어 있으면 안됨).
29. 수행평가만으로 평가하는 교과: 신체장애학생(신체장애에 준하는 부상 학생)에 대한 인정점 산출 방법을 평가계획에 명시했는지.
30. 정기시험을 실시하는 교과: 동점자 처리 기준, 교차채점 계획을 반드시 작성했는지.
31. 앞부분의 수행평가 영역명과 동점자 처리 기준표의 영역명이 동일하게 기재되었는지 (예: 잘못된 예 - 수행평가 세부계획의 영역명엔 '효소의 작용 실험' / 동점자 기준표엔 '효소 실험' 또는 '과학 실험1' 로 불일치).
32. 1·2학년: 학기 단위 성취수준을 설정하고, 성취기준별 성취수준을 명시했는지.
33. 과목별 최소 성취수준을 설정했는지 - 대상: 1·2학년 공통국어/공통수학/기본수학/공통영어/기본영어/한국사/통합사회/통합과학/과학탐구실험, 3학년 공통과목 국어·수학·영어 및 전문교과Ⅱ 실무과목.
34. [우려사항 전용 - 확정적 위반이 아닌 검토 필요 사항으로 분류] 수행평가 결시자에 대한 "추가(재) 응시 기회"를 "1회만" 등 구체적인 횟수로 명시적으로 제한하고 있는 경우에만 우려사항으로 보고할 것. 충남 학업성적관리 시행지침 제14조②는 "교과목별 수행평가에 참여하지 못한 학생은 추후에 평가 기회를 다시 부여하여 평가하되, 장기결석 등으로 참여하지 못한 학생의 성적처리는 기본점수를 부여하지 않고, 교과별 평가계획에 제시된 인정점 부여기준에 따라 처리한다"고 규정하고 있어, 재응시 기회를 사전에 "1회"처럼 못박아 그 이후에는 기계적으로 인정점(기본점수 미만)만 부여하도록 한 문구는 지침의 "추후 기회를 다시 부여" 원칙과 잠재적으로 상충될 소지가 있음.
※ 판정 시 주의: "수행평가에 참여하지 못한 학생은 추후에 평가 기회를 다시 부여하되, ~" 로 시작하는 문구는 거의 모든 과목에 공통으로 들어가는 표준 문구이며 그 자체는 전혀 문제가 없다. 문제는 같은 유의사항 섹션 안에 "수행평가에 결시한 학생은 추후 평가 기회를 1회 부여한다"처럼 별도로 횟수를 못박는 문장이 추가로 붙어 있는 경우이다. 표준 문구만 있고 횟수 제한 문장이 없으면 절대 우려사항으로 보고하지 말 것. 표준 문구 뒤에 "1회", "한 번만", "1회에 한하여" 등 구체적 횟수 제한 문장이 실제로 존재하는 경우에만 그 문장을 근거로 우려사항으로 보고할 것. 반대로 "추가 응시 기회를 부여하여 결시가 없도록 노력한다"처럼 횟수를 명시적으로 제한하지 않은 일반적인 문구는 지침 취지에 부합하는 정상적인 서술이므로 절대 우려사항으로 보고하지 말 것.

※ 참고: 수행평가는 학생의 학습과제 수행 과정과 결과를 평가하며, 수업 중 실시 원칙이고 가정 등에서 이루어지는 과제형 수행평가는 금지된다(단, 영어듣기평가는 예외). 신체장애 학생의 경우 정기시험 실시시 인정점 계산식은 [수행평가 해당영역 기본점수 + (수행평가 해당영역 배점(기본점수 제외) × 해당학생 정기시험 득점/정기시험 배점총점)] 이다.

// ---------- GAS 백엔드 호출 ----------
async function callBackend(){
  // text/plain 으로 보내야 브라우저의 CORS preflight(OPTIONS)를 피할 수 있음
  const response = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ pdfBase64: pdfBase64, systemPrompt: CHECK_SYSTEM_PROMPT })
  });
  if(!response.ok){
    throw new Error(`서버 응답 오류 (HTTP ${response.status})`);
  }
  const data = await response.json();
  if(!data.ok){
    throw new Error(data.error || '알 수 없는 오류가 발생했습니다.');
  }
  return data.raw;
}

function parseJsonLoose(text){
  let clean = text.replace(/```json/g,'').replace(/```/g,'').trim();
  const firstBrace = Math.min(
    ...['{','['].map(ch=>{const i=clean.indexOf(ch); return i===-1?Infinity:i;})
  );
  const lastBrace = Math.max(
    ...['}',']'].map(ch=>{const i=clean.lastIndexOf(ch); return i===-1?-1:i;})
  );
  if(firstBrace !== Infinity && lastBrace !== -1){
    clean = clean.slice(firstBrace, lastBrace+1);
  }
  return JSON.parse(clean);
}

// ---------- 메인 플로우 ----------
startBtn.addEventListener('click', runCheck);
resetBtn.addEventListener('click', ()=>location.reload());

async function runCheck(){
  startBtn.disabled = true;
  progressLog.innerHTML = '';
  summaryArea.innerHTML = '';
  resultsArea.innerHTML = '';
  clearError();

  try{
    const l1 = logLine('PDF 전체를 분석하는 중... (과목 수에 따라 1~2분 정도 걸릴 수 있어요)', 'active');
    const raw = await callBackend();
    let parsed;
    try{
      parsed = parseJsonLoose(raw);
    }catch(e){
      throw new Error('점검 결과를 인식하지 못했습니다. 다시 시도해보시거나 PDF 용량을 확인해주세요.');
    }
    const subjectResults = parsed.과목별결과 || (Array.isArray(parsed) ? parsed : null);
    if(!subjectResults || subjectResults.length === 0){
      throw new Error('과목별 결과를 찾지 못했습니다.');
    }
    setLineDone(l1, `분석 완료 - 총 ${subjectResults.length}개 과목`);

    let totalIssues = 0;
    subjectResults.forEach(r => totalIssues += (r.이슈||[]).length);
    renderSummary(subjectResults.length, subjectResults.length, totalIssues);

    subjectResults.forEach(result => renderSubjectCard(result, result.과목명));

  }catch(e){
    showError(e.message);
  }finally{
    resetBtn.style.display = 'inline-block';
  }
}

function renderSummary(totalSubjects, checkedSubjects, totalIssues){
  summaryArea.innerHTML = `
    <div class="summary-bar">
      <div class="stat"><div class="num">${totalSubjects}</div><div class="label">전체 과목 수</div></div>
      <div class="stat ok"><div class="num">${checkedSubjects}</div><div class="label">점검 완료 과목</div></div>
      <div class="stat issue"><div class="num">${totalIssues}</div><div class="label">발견된 이슈 총계</div></div>
    </div>
  `;
}

function renderSubjectCard(result, fallbackName){
  const subj = result.과목명 || fallbackName;
  const total = result.총점검항목 ?? '-';
  const okCount = result.충족항목수 ?? '-';
  const issues = result.이슈 || [];
  const concerns = result.우려사항 || [];
  const hasIssue = issues.length > 0;
  const hasConcern = concerns.length > 0;
  const hasAnything = hasIssue || hasConcern;

  let bodyContent = '';
  if(hasIssue){
    bodyContent += `<div class="section-label">이슈 (${issues.length}건)</div>` + issues.map(issueHtml).join('');
  }
  if(hasConcern){
    bodyContent += `<div class="section-label">우려사항 · 검토 권고 (${concerns.length}건)</div>` + concerns.map(concernHtml).join('');
  }
  if(!hasAnything){
    bodyContent = '<div class="clean-msg">✓ 점검 기준상 특이사항이 발견되지 않았습니다.</div>';
  }

  const badges = [];
  if(hasIssue) badges.push(`<span class="pill issue">${issues.length}건 이슈</span>`);
  if(hasConcern) badges.push(`<span class="pill concern">${concerns.length}건 우려</span>`);
  if(!hasAnything) badges.push(`<span class="pill clean">이상 없음</span>`);

  const card = document.createElement('div');
  card.className = 'subject-card';
  card.innerHTML = `
    <div class="subject-head">
      <span class="name">${escapeHtml(subj)}</span>
      <span class="meta">
        <span>충족 ${okCount}/${total}</span>
        ${badges.join('')}
        <span class="arrow">▶</span>
      </span>
    </div>
    <div class="subject-body">
      ${bodyContent}
    </div>
  `;
  const head = card.querySelector('.subject-head');
  const body = card.querySelector('.subject-body');
  const arrow = card.querySelector('.arrow');
  head.addEventListener('click', ()=>{
    body.classList.toggle('open');
    arrow.classList.toggle('open');
  });
  // 이슈/우려사항이 있는 과목은 기본적으로 펼쳐서 보여줌
  if(hasAnything){
    body.classList.add('open');
    arrow.classList.add('open');
  }
  resultsArea.appendChild(card);
}

function issueHtml(issue){
  return `
    <div class="issue-row">
      <div class="row-top">
        <span class="num-tag">#${escapeHtml(issue.번호||'-')}</span>
        <span class="area">${escapeHtml(issue.영역||'')}</span>
      </div>
      ${issue.위치 ? `<div class="loc">위치: ${escapeHtml(issue.위치)}</div>` : ''}
      <div class="found"><b>발견 내용</b> · ${escapeHtml(issue.발견내용||'')}</div>
      <div class="advice"><b>컨설팅 방향</b> · ${escapeHtml(issue.컨설팅방향||'')}</div>
    </div>
  `;
}

function concernHtml(item){
  return `
    <div class="concern-row">
      <div class="row-top">
        <span class="num-tag">#${escapeHtml(item.번호||'-')}</span>
        <span class="area">${escapeHtml(item.영역||'')}</span>
      </div>
      ${item.위치 ? `<div class="loc">위치: ${escapeHtml(item.위치)}</div>` : ''}
      <div class="found"><b>발견 내용</b> · ${escapeHtml(item.발견내용||'')}</div>
      <div class="advice"><b>검토 권고</b> · ${escapeHtml(item.설명||'')}</div>
    </div>
  `;
}

function renderSubjectError(subj, msg){
  const card = document.createElement('div');
  card.className = 'subject-card';
  card.innerHTML = `
    <div class="subject-head"><span class="name">${escapeHtml(subj)}</span><span class="pill issue">오류</span></div>
    <div class="subject-body open"><div class="error-box">점검 중 오류가 발생했습니다: ${escapeHtml(msg)}</div></div>
  `;
  resultsArea.appendChild(card);
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[s]));
}
